name: Quality Gate (Staging)

# Runs on release/* pushes and PRs to develop/main.
# Replaces the old staging Railway deploy — we run the full test suite
# against a temporary PostgreSQL container instead of a live staging server.
# This is sufficient for an MVP: CI tests ARE the staging gate.
#
# When you have budget for a staging environment later, re-add the
# Railway deploy jobs below the test job.

on:
  push:
    branches: ["release/**"]
  pull_request:
    branches: [develop, main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── 1. Full backend test suite ────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       test_erikshaw_gate
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Django system check + full test suite
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: erickshaw.settings.development
          SECRET_KEY:  quality-gate-secret-key-minimum-32-chars
          DEBUG:       "True"
          DB_NAME:     test_erikshaw_gate
          DB_USER:     postgres
          DB_PASSWORD: postgres
          DB_HOST:     localhost
          DB_PORT:     "5432"
        run: |
          python manage.py check
          python manage.py test --verbosity=2

  # ── 2. Frontend build check ───────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        env:
          VITE_API_URL: https://api.erikshawdekho.com/api
        run: |
          npm ci
          npm run build

  # ── NOTE: Staging Railway deploy removed (single Railway plan) ────
  # When ready to add staging environment:
  # 1. Create a new Railway service for staging
  # 2. Add RAILWAY_TOKEN_STAGING secret in GitHub repo settings
  # 3. Add a deploy-backend-staging job here (see git history for template)
