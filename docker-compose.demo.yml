version: '3.9'

services:

  db:
    image: postgres:15-alpine
    container_name: erd_postgres_demo
    restart: always
    environment:
      POSTGRES_DB: ${DEMO_DB_NAME:-erikshaw_demo_db}
      POSTGRES_USER: ${DEMO_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DEMO_DB_PASSWORD:-postgres}
    volumes:
      - postgres_demo_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEMO_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erd_backend_demo
    restart: always
    command: >
      sh -c "python manage.py check_env_db_consistency &&
             python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py seed_demo &&
             python manage.py check_auth_integrity --warn-only &&
             gunicorn erickshaw.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment:
      APP_ENV: demo
      ENVIRONMENT: demo
      DEBUG: "False"
      SECRET_KEY: ${DEMO_SECRET_KEY:-django-insecure-demo-change-me}
      DB_NAME: ${DEMO_DB_NAME:-erikshaw_demo_db}
      DB_USER: ${DEMO_DB_USER:-postgres}
      DB_PASSWORD: ${DEMO_DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      DEMO_DATABASE_URL: ${DEMO_DATABASE_URL:-}
      DATABASE_URL: ${DEMO_DATABASE_URL:-}
      ALLOWED_HOSTS: ${DEMO_ALLOWED_HOSTS:-demo.erikshawdekho.com,demo-api.erikshawdekho.com,localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${DEMO_CORS_ALLOWED_ORIGINS:-https://demo.erikshawdekho.com}
      PLATFORM_URL: ${DEMO_PLATFORM_URL:-https://demo.erikshawdekho.com}
    volumes:
      - media_demo_data:/app/media
      - static_demo_data:/app/staticfiles
    ports:
      - "8010:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${DEMO_VITE_API_URL:-https://demo-api.erikshawdekho.com/api}
    container_name: erd_frontend_demo
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_demo_data:
  media_demo_data:
  static_demo_data:
