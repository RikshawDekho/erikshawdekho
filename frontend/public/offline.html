<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#16a34a" />
    <title>Offline | ErikshawDekho</title>
    <style>
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --border: #e2e8f0;
        --text: #0f172a;
        --muted: #475569;
        --accent: #16a34a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Nunito, Inter, system-ui, sans-serif;
        background: radial-gradient(circle at top, #dcfce7 0%, var(--bg) 40%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(520px, 100%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 14px 35px rgba(15, 23, 42, 0.1);
        text-align: center;
      }
      .logo {
        font-size: 42px;
        margin-bottom: 8px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(22px, 4vw, 30px);
      }
      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.6;
        font-size: 15px;
      }
      .actions {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      button,
      a {
        border: none;
        border-radius: 10px;
        padding: 11px 16px;
        font-size: 14px;
        font-weight: 700;
        font-family: inherit;
        text-decoration: none;
        cursor: pointer;
      }
      button {
        background: var(--accent);
        color: #fff;
      }
      a {
        background: #f1f5f9;
        color: #0f172a;
        border: 1px solid var(--border);
      }
      .hint {
        margin-top: 16px;
        font-size: 12px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">🛺</div>
      <h1>You are offline</h1>
      <p>
        ErikshawDekho could not reach the network. You can retry now, or open cached sections like marketplace and dealers once connectivity returns.
      </p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">Retry</button>
        <a href="/driver/marketplace">Open Marketplace</a>
      </div>
      <div class="hint">Tip: install the app for faster loading and better offline resilience.</div>
    </main>
  </body>
</html>
