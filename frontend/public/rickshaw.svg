<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a7c4f"/>

  <!-- Rickshaw body -->
  <rect x="14" y="22" width="28" height="18" rx="4" fill="#ffffff"/>
  <!-- Roof -->
  <path d="M12 22 Q32 12 52 22" stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Roof top bar -->
  <rect x="12" y="20" width="40" height="4" rx="2" fill="#f59e0b"/>

  <!-- Window -->
  <rect x="20" y="26" width="10" height="8" rx="2" fill="#1a7c4f" opacity="0.5"/>
  <rect x="33" y="26" width="6" height="8" rx="2" fill="#1a7c4f" opacity="0.5"/>

  <!-- Body bottom / chassis -->
  <rect x="14" y="38" width="28" height="4" rx="1" fill="#115c38"/>

  <!-- Front hood -->
  <path d="M42 28 L52 30 L52 40 L42 40 Z" fill="#22a866"/>
  <rect x="48" y="30" width="4" height="6" rx="1" fill="#f59e0b" opacity="0.8"/>

  <!-- Wheels -->
  <circle cx="20" cy="44" r="6" fill="#1e293b"/>
  <circle cx="20" cy="44" r="3" fill="#94a3b8"/>
  <circle cx="44" cy="44" r="6" fill="#1e293b"/>
  <circle cx="44" cy="44" r="3" fill="#94a3b8"/>

  <!-- Lightning bolt (electric) -->
  <path d="M30 17 L27 23 L31 23 L28 30 L34 22 L30 22 Z" fill="#f59e0b"/>
</svg>
