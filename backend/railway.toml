[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health/"
healthcheckTimeout = 120

# ── Non-secret defaults (demo Railway service) ─────────────────────
# This railway.toml targets the erikshawdekho-demo Railway service.
# For a production service, override DJANGO_SETTINGS_MODULE, APP_ENV,
# ENVIRONMENT, and DATABASE_URL in Railway's environment variables UI.
# SECRET_KEY must always be set as a secret in Railway's UI.
[variables]
DJANGO_SETTINGS_MODULE = "erickshaw.settings.demo"
APP_ENV                = "demo"
ENVIRONMENT            = "demo"
DEBUG                  = "False"
CORS_ALLOWED_ORIGINS   = "https://erikshawdekho-demo.up.railway.app"
CSRF_TRUSTED_ORIGINS   = "https://erikshawdekho-demo.up.railway.app"
PLATFORM_URL           = "https://erikshawdekho-demo.up.railway.app"
PLATFORM_NAME          = "eRickshawDekho"
PLATFORM_TAGLINE       = "Bharosemand Platform"
SUPPORT_EMAIL          = "support@erikshawdekho.com"
DEFAULT_FROM_EMAIL     = "noreply@erikshawdekho.com"
ADMIN_PASSWORD         = "admin1234"
PORT                   = "8080"
