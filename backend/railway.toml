[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health/"
healthcheckTimeout = 120

# ── Non-secret defaults (production) ──────────────────────────────
# These are committed to the repo and applied automatically by Railway.
# Secrets (SECRET_KEY, DATABASE_URL, email passwords) are set by the
# railway-env-setup.yml GitHub Actions workflow — never committed.
# Railway injects DATABASE_URL automatically when Postgres service is linked.
[variables]
DJANGO_SETTINGS_MODULE = "erickshaw.settings.production"
APP_ENV                = "prod"
ENVIRONMENT            = "production"
DEBUG                  = "False"
ALLOWED_HOSTS          = "erikshawdekho.com,www.erikshawdekho.com,api.erikshawdekho.com,*.up.railway.app"
CORS_ALLOWED_ORIGINS   = "https://erikshawdekho.com,https://www.erikshawdekho.com,https://erikshawdekho.vercel.app"
PLATFORM_URL           = "https://www.erikshawdekho.com"
PLATFORM_NAME          = "eRickshawDekho"
PLATFORM_TAGLINE       = "Bharosemand Platform"
SUPPORT_EMAIL          = "support@erikshawdekho.com"
DEFAULT_FROM_EMAIL     = "noreply@erikshawdekho.com"
# ── Admin auto-creation: set ADMIN_USERNAME + ADMIN_PASSWORD as Railway secrets
# FORCE_ADMIN_PASSWORD_UPDATE=true ensures password is always synced from env on redeploy
FORCE_ADMIN_PASSWORD_UPDATE = "true"
